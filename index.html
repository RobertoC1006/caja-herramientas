<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CajaHerramientas AI - Quitar Fondo y Utilidades de Imagen en Lote</title>
  <meta name="description"
    content="Colección de herramientas locales para procesar imágenes en lote: elimina fondos con IA, redimensiona y convierte formatos. 100% privado y gratuito.">
  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/main.css">
</head>

<body>
  <div class="app-container">
    <!-- Inject Sidebar component -->
    <load src="src/components/sidebar.html" />

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main Workspace (Área de Contenido) -->
    <main class="main-content">
      <!-- Inject Header component -->
      <load src="src/components/header.html" />

      <!-- Dynamic Tool Panels -->
      <div class="workspace-area">
        <!-- Inject Bg Remover Tool component -->
        <load src="src/components/bg-remover-tool.html" />
        <!-- Inject Success Screen component -->
        <load src="src/components/success-screen.html" />
      </div>

      <!-- Horizontal Ad Container -->
      <div id="ad-horizontal-container" class="ad-box-horizontal"
        style="min-height: 90px; background: rgba(255,255,255,0.01); display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: var(--radius-md); border: 1px dashed var(--border-color); font-size: 0.75rem; color: var(--text-muted); margin-top: auto; padding: 1rem; text-align: center; gap: 0.25rem;">
        <span
          style="font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted);">Publicidad</span>
        <span style="font-size: 0.8rem; color: var(--text-secondary);">Anuncio Horizontal Banner (Leaderboard)</span>
      </div>

      <!-- Footer -->
      <footer class="app-footer-bar">
        <p>&copy; 2026 CajaHerramientas • Procesamiento local</p>
        <div class="footer-links" style="margin-top: 0.5rem; display: flex; justify-content: center; gap: 1rem;">
          <a id="btn-legal-trigger" class="footer-link"
            style="color: var(--text-muted); font-size: 0.75rem; text-decoration: underline; cursor: pointer; transition: color var(--transition-fast);">Política
            de Privacidad y Condiciones</a>
        </div>
      </footer>
    </main>
  </div>

  <!-- Inject Global Comparison Slider Modal component -->
  <load src="src/components/preview-modal.html" />
  <!-- Inject Download Timer Modal component -->
  <load src="src/components/download-modal.html" />
  <!-- Inject Privacy Policy Modal component -->
  <load src="src/components/privacy-modal.html" />

  <!-- Scripts -->
  <script type="module" src="/src/main.js"></script>
</body>

</html>
